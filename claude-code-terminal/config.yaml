---
name: "Claude Code Terminal"
version: "1.1.3"
slug: claude_code_terminal
description: "Claude Code with persistent tmux sessions - never lose your context"
url: "https://github.com/RobFahndrich/claude-code-haos-addon"
startup: services
boot: auto
init: false
arch:
  - aarch64
  - amd64
ingress: true
ingress_port: 0
ingress_stream: true
panel_icon: mdi:robot
panel_title: "Claude Code"
homeassistant_api: true
hassio_api: true
hassio_role: manager
map:
  - homeassistant_config:rw
  - addon_config:rw
  - share:rw
  - ssl:ro
  - media:ro
options:
  anthropic_api_key: ""
  model: "sonnet"
  yolo_mode: false
  tmux_history_limit: 50000
  session_name: "claude"
schema:
  anthropic_api_key: "password"
  model: "list(sonnet|opus|haiku)"
  yolo_mode: "bool"
  tmux_history_limit: "int"
  session_name: "str"
